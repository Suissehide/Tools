# traefik/traefik.yml
global:
  checkNewVersion: true

api:
  insecure: false
  dashboard: true

log:
  level: DEBUG # (Default: error) DEBUG, INFO, WARN, ERROR, FATAL, PANIC
  format: common
  filePath: /logs/traefik.log

accessLog:
  filePath: /logs/access.log
  bufferingSize: 100 # Configuring a buffer of 100 lines
  filters:
    statusCodes: "204-299,400-499,500-599"

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: ":443"

  ping:
    address: ":8082"

ping:
  entryPoint: ping

providers:
  docker:
    exposedByDefault: false
    watch: true
    endpoint: tcp://socket-proxy:2375
    # Automatically set Host rule for services
    # defaultrule: "Host(`{{ index .Labels \"com.docker.compose.service\" }}.$DOMAIN_NAME`)"
    network: proxy
    # swarmMode: false
  file:
    directory: /rules # Load dynamic configuration from one or more .toml or .yml files in a directory
    watch: true # Only works on top level files in the rules folder
    # filename: /path/to/file # Load dynamic configuration from a file

certificatesResolvers:
  ovh:
    acme:
      email: ${OVH_EMAIL}
      storage: /letsencrypt/acme.json
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory # Uncomment for testing
      dnsChallenge:
        provider: ovh
        resolvers:
          - "213.186.33.99:53" # OVH DNS resolver
  letsencrypt: # Alias used by Dokploy — same config as ovh
    acme:
      email: ${OVH_EMAIL}
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: ovh
        resolvers:
          - "213.186.33.99:53"

