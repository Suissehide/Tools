# traefik/traefik.yml
global:
  checkNewVersion: true

entryPoints:
  http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: https
          scheme: https

  https:
    address: ":443"
    # Allow these IPs to set the X-Forwarded-* headers - Cloudflare IPs: https://www.cloudflare.com/ips/
    # forwardedHeaders:
    #   trustedIPs: $LOCAL_IPS
    http:
      # middlewares: chain-basic-auth@file
      tls:
        # options: tls-opts@file
        # Add ovh as default certResolver for all services. Also enables TLS and no need to specify on individual services
        certResolver: ovh
        domains:
          - main: $DOMAIN_NAME
            sans: "*.$DOMAIN_NAME"
          # - main: $DOMAIN_NAME2 # Pulls main cert for second domain
          #   sans: "*.$DOMAIN_NAME2" # Pulls wildcard cert for second domain
  # traefik:
  #   address: ":8080"

  ping:
    address: ":8081"

api:
  dashboard: true

ping:
  entryPoint: ping

# serversTransport:
#   insecureSkipVerify: true

log:
  level: INFO # (Default: error) DEBUG, INFO, WARN, ERROR, FATAL, PANIC
  format: common
  filePath: /logs/traefik.log

accessLog:
  filePath: /logs/access.log
  bufferingSize: 100 # Configuring a buffer of 100 lines
  filters:
    statusCodes: "204-299,400-499,500-599"

providers:
  docker:
    exposedByDefault: false
    # endpoint: unix:///var/run/docker.sock # Use Docker Socket Proxy instead for improved security
    watch: true
    endpoint: tcp://socket-proxy:2375
    # Automatically set Host rule for services
    # defaultrule: "Host(`{{ index .Labels \"com.docker.compose.service\" }}.$DOMAIN_NAME`)"
    network: traefik-net
    # swarmMode: false
  file:
    directory: /rules # Load dynamic configuration from one or more .toml or .yml files in a directory
    # filename: /path/to/file # Load dynamic configuration from a file
    watch: true # Only works on top level files in the rules folder

certificatesResolvers:
  ovh:
    acme:
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory # LetsEncrypt Staging Server - uncomment when testing
      email: ${OVH_EMAIL}
      storage: /letsencrypt/acme.json
      dnsChallenge:
        provider: ovh

