######### IMPORTANT #############
# This is my main docker-compose file with most of the apps. I run docker on other systems with smaller stacks (web and synology).
# You can copy-paste services from one docker-compose file in this repo to another to add other apps.

########################### SECRETS
secrets:
  htpasswd:
    file: $DOCKERDIR/secrets/htpasswd
  traefik_forward_auth:
    file: $DOCKERDIR/secrets/traefik_forward_auth
  portainer_key:
    file: $DOCKERDIR/secrets/portainer_key
  mysql_root_password:
    file: $DOCKERDIR/secrets/mysql_root_password
  guac_db_name:
    file: $DOCKERDIR/secrets/guac_db_name
  guac_mysql_user:
    file: $DOCKERDIR/secrets/guac_mysql_user
  guac_mysql_password:
    file: $DOCKERDIR/secrets/guac_mysql_password

########################### EXTENSION FIELDS
# Helps eliminate repetition of sections
# More Info on how to use this: https://github.com/htpcBeginner/docker-traefik/pull/228

# Common environment values
x-environment: &default-tz-puid-pgid
  TZ: $TZ
  PUID: $PUID
  PGID: $PGID

# Keys common to some of the services in basic-services.txt
x-common-keys-core: &common-keys-core
    network_mode: bridge
#    security_opt:
#      - no-new-privileges:true
    restart: always
#    profiles:
#      - core

########################### NETWORKS
networks:
  proxy:
    name: proxy
    driver: bridge
  socket_proxy:
    name: socket_proxy
    driver: bridge
    internal: true # No external access - only containers on this network can reach the socket proxy
  dokploy-network:
    name: dokploy-network
    external: true

########################### SERVICES
services:

  ############################# DEPLOYMENT

  # Traefik - Reverse Proxy
  # Touch (create empty files) traefik.log.
  # touch $DOCKERDIR/logs/cloudserver/traefik.log
  traefik:
    container_name: traefik
    image: "traefik:latest"
    restart: unless-stopped
    profiles: [ "core", "all" ]
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
      - socket_proxy
      - dokploy-network
    depends_on:
      - socket-proxy
    command:
      - "--configFile=/config/traefik.yml"
      - --global.sendAnonymousUsage=true
      # Allow these IPs to set the X-Forwarded-* headers - Cloudflare IPs: https://www.cloudflare.com/ips/
      # - --entrypoints.websecure.forwardedHeaders.trustedIPs=$LOCAL_IPS
      # - --entrypoints.websecure.http.middlewares=chain-basic-auth@file
      - --entrypoints.websecure.http.tls.options=tls-opts@file
      # Add ovh as default certresolver for all services. Also enables TLS and no need to specify on individual services
      - --entrypoints.websecure.http.tls.certresolver=ovh
      - --entrypoints.websecure.http.tls.domains[0].main=$DOMAIN_NAME
      - --entrypoints.websecure.http.tls.domains[0].sans=*.$DOMAIN_NAME
      # - --entrypoints.https.http.tls.domains[1].main=$DOMAIN_NAME2 # Pulls main cert for second domain
      # - --entrypoints.https.http.tls.domains[1].sans=*.$DOMAIN_NAME2 # Pulls wildcard cert for second domain
      # certificatesResolvers config moved to traefik.yml
      # - --metrics.prometheus=true
      # - --metrics.prometheus.buckets=0.1,0.3,1.2,5.0
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O- http://localhost:8082/ping || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - $DOCKERDIR/appdata/traefik/config:/config:ro
      - $DOCKERDIR/appdata/traefik/rules:/rules:ro
      - $DOCKERDIR/letsencrypt:/letsencrypt
      - $DOCKERDIR/logs/traefik:/logs # for fail2ban or crowdsec
    environment:
      TZ: $TZ
      HTPASSWD_FILE: /run/secrets/htpasswd # HTPASSWD_FILE can be whatever as it is not used/called anywhere.
      DOMAIN_NAME: $DOMAIN_NAME # Passing the domain name to traefik container to be able to use the variable in rules.
      OVH_ENDPOINT: $OVH_ENDPOINT
      OVH_APPLICATION_KEY: $OVH_APPLICATION_KEY
      OVH_APPLICATION_SECRET: $OVH_APPLICATION_SECRET
      OVH_CONSUMER_KEY: $OVH_CONSUMER_KEY
      OVH_EMAIL: $OVH_EMAIL
    secrets:
      - htpasswd
    labels:
      # - "autoheal=true"
      - "traefik.enable=true"
      # HTTP-to-HTTPS Redirect
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`{host:.+}`)"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # HTTP Routers
      - "traefik.http.routers.traefik-rtr.entrypoints=websecure"
      - "traefik.http.routers.traefik-rtr.rule=Host(`traefik.$DOMAIN_NAME`)"
      - "traefik.http.routers.traefik-rtr.tls=true" # Some people had 404s without this
      - "traefik.http.routers.traefik-rtr.tls.certresolver=ovh" # Comment out this line after first run of traefik to force the use of wildcard certs
      - "traefik.http.routers.traefik-rtr.tls.domains[0].main=$DOMAIN_NAME"
      - "traefik.http.routers.traefik-rtr.tls.domains[0].sans=*.$DOMAIN_NAME"
      # - "traefik.http.routers.traefik-rtr.tls.domains[1].main=$DOMAIN_NAME2" # Pulls main cert for second domain
      # - "traefik.http.routers.traefik-rtr.tls.domains[1].sans=*.$DOMAIN_NAME2" # Pulls wildcard cert for second domain
      ## Services - API
      - "traefik.http.routers.traefik-rtr.service=api@internal"
      ## Healthcheck/ping
      - "traefik.http.routers.ping.rule=Host(`traefik.$DOMAIN_NAME`) && Path(`/ping`)"
      - "traefik.http.routers.ping.tls=true"
      - "traefik.http.routers.ping.service=ping@internal"
      ## Middlewares
      #- "traefik.http.routers.traefik-rtr.middlewares=chain-no-auth@file" # For No Authentication
      - "traefik.http.routers.traefik-rtr.middlewares=chain-basic-auth@file" # For Basic HTTP Authentication
      #- "traefik.http.routers.traefik-rtr.middlewares=chain-oauth@file" # For Google OAuth
      #- "traefik.http.routers.traefik-rtr.middlewares=chain-authelia@file" # For Authelia Authentication

  # Docker Socket Proxy - Secure read-only access to Docker API for Traefik
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: socket-proxy
    restart: unless-stopped
    profiles: [ "core", "all" ]
    security_opt:
      - no-new-privileges:true
    networks:
      - socket_proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: 1
      NETWORKS: 1
      SERVICES: 0
      TASKS: 0
      INFO: 0
      IMAGES: 0
      VOLUMES: 0
      EXEC: 0
      POST: 0

  # CrowdSec - Intrusion Detection & Prevention
  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped
    profiles: [ "core", "all" ]
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    volumes:
      - $DOCKERDIR/appdata/crowdsec/data:/var/lib/crowdsec/data
      - $DOCKERDIR/appdata/crowdsec/config:/etc/crowdsec
      - $DOCKERDIR/logs/traefik:/var/log/traefik:ro
    environment:
      TZ: $TZ
      COLLECTIONS: "crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/linux"

  # CrowdSec Traefik Bouncer - Blocks banned IPs at the proxy level
  crowdsec-bouncer:
    image: fbonalair/traefik-crowdsec-bouncer:latest
    container_name: crowdsec-bouncer
    restart: unless-stopped
    profiles: [ "core", "all" ]
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    depends_on:
      - crowdsec
    environment:
      TZ: $TZ
      CROWDSEC_BOUNCER_API_KEY: $CROWDSEC_BOUNCER_API_KEY
      CROWDSEC_AGENT_HOST: crowdsec:8080

  # Portainer - WebUI for Containers
  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    profiles: [ "core", "all" ]
    security_opt:
      - no-new-privileges:true
    networks:
      - proxy
    command: -H unix:///var/run/docker.sock # # Use Docker Socket Proxy instead for improved security
    # command: -H tcp://socket-proxy:2375
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro # # Use Docker Socket Proxy instead for improved security
      - $DOCKERDIR/appdata/portainer/data:/data # Change to local directory if you want to save/transfer config locally
      - $DOCKERDIR/secrets/portainer_key:/run/secrets/portainer
    environment:
      - TZ=$TZ
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.portainer-rtr.entrypoints=websecure"
      - "traefik.http.routers.portainer-rtr.rule=Host(`portainer.$DOMAIN_NAME`)"
      - "traefik.http.routers.portainer-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.portainer-rtr.middlewares=chain-basic-auth@file"
      ## HTTP Services
      - "traefik.http.routers.portainer-rtr.service=portainer-svc"
      - "traefik.http.services.portainer-svc.loadbalancer.server.port=9000"

  # Dokploy - Self-hosted PaaS
  dokploy:
    image: dokploy/dokploy:latest
    container_name: dokploy
    restart: unless-stopped
    profiles: [ "core", "all" ]
    networks:
      - proxy
    depends_on:
      - dokploy-postgres
      - dokploy-redis
    security_opt:
      - no-new-privileges:true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/dokploy:/etc/dokploy
    environment:
      TZ: $TZ
      DATABASE_URL: postgresql://dokploy:$DOKPLOY_POSTGRES_PASSWORD@dokploy-postgres:5432/dokploy
      REDIS_URL: redis://dokploy-redis:6379
      DOKPLOY_TRAEFIK_ENABLED: "false"
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.dokploy-rtr.entrypoints=websecure"
      - "traefik.http.routers.dokploy-rtr.rule=Host(`dokploy.$DOMAIN_NAME`)"
      - "traefik.http.routers.dokploy-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.dokploy-rtr.middlewares=chain-basic-auth@file"
      ## HTTP Services
      - "traefik.http.routers.dokploy-rtr.service=dokploy-svc"
      - "traefik.http.services.dokploy-svc.loadbalancer.server.port=3000"

  # Dokploy Redis - Queue for Dokploy
  dokploy-redis:
    image: redis:7-alpine
    container_name: dokploy-redis
    restart: unless-stopped
    profiles: [ "core", "all" ]
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    volumes:
      - $DOCKERDIR/appdata/dokploy-redis:/data

  # Dokploy Postgres - Database for Dokploy
  dokploy-postgres:
    image: postgres:16-alpine
    container_name: dokploy-postgres
    restart: unless-stopped
    profiles: [ "core", "all" ]
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    volumes:
      - $DOCKERDIR/appdata/dokploy-postgres:/var/lib/postgresql/data
    environment:
      TZ: $TZ
      POSTGRES_USER: dokploy
      POSTGRES_PASSWORD: $DOKPLOY_POSTGRES_PASSWORD
      POSTGRES_DB: dokploy

  ############################# FRONTENDS

  # Autoindex - Simple Directory Index
  autoindex:
    container_name: autoindex
    image: dceoy/nginx-autoindex:latest
    restart: unless-stopped
    profiles: [ "apps", "all" ]
    networks:
      - proxy
    # ports:
    #   - "$AUTOINDEX_PORT:80"
    volumes:
      - $USERDIR:/var/lib/nginx/html:ro # Location you want to index
      #- $EXTDRIVE:/var/lib/nginx/html:ro # Location you want to index
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.autoindex-rtr.entrypoints=websecure"
      - "traefik.http.routers.autoindex-rtr.rule=Host(`index.$DOMAIN_NAME`)"
      - "traefik.http.routers.autoindex-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.autoindex-rtr.middlewares=chain-oauth@file"
      ## HTTP Services
      - "traefik.http.routers.autoindex-rtr.service=autoindex-svc"
      - "traefik.http.services.autoindex-svc.loadbalancer.server.port=80"

  # Homepage - Application Dashboard
  homepage:
    image: ghcr.io/benphelps/homepage:latest
    container_name: homepage
    restart: unless-stopped
    profiles: [ "apps", "all" ]
    networks:
      - proxy
    # ports:
    #  - "$HOMEPAGE_PORT:3000"
    volumes:
      - $DOCKERDIR/appdata/homepage:/app/config
    environment:
      TZ: $TZ
      PUID: $PUID
      PGID: $PGID
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.homepage-rtr.entrypoints=websecure"
      - "traefik.http.routers.homepage-rtr.rule=Host(`$DOMAIN_NAME`,`www.$DOMAIN_NAME`)"
      - "traefik.http.routers.homepage-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.homepage-rtr.middlewares=chain-oauth@file"
      ## HTTP Services
      - "traefik.http.routers.homepage-rtr.service=homepage-svc"
      - "traefik.http.services.homepage-svc.loadbalancer.server.port=3000"

  ############################# STORAGE

  # MinIO - Self-hosted S3-compatible object storage (backups DokPloy)
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    profiles: [ "db", "all" ]
    networks:
      - proxy
    security_opt:
      - no-new-privileges:true
    volumes:
      - $DOCKERDIR/appdata/minio:/data
    environment:
      TZ: $TZ
      MINIO_ROOT_USER: $MINIO_ROOT_USER
      MINIO_ROOT_PASSWORD: $MINIO_ROOT_PASSWORD
      MINIO_BROWSER_REDIRECT_URL: https://minio.$DOMAIN_NAME
    command: server /data --console-address ":9001"
    labels:
      - "traefik.enable=true"
      ## Console (UI)
      - "traefik.http.routers.minio-console-rtr.entrypoints=websecure"
      - "traefik.http.routers.minio-console-rtr.rule=Host(`minio.$DOMAIN_NAME`)"
      - "traefik.http.routers.minio-console-rtr.tls=true"
      - "traefik.http.routers.minio-console-rtr.middlewares=chain-basic-auth@file"
      - "traefik.http.routers.minio-console-rtr.service=minio-console-svc"
      - "traefik.http.services.minio-console-svc.loadbalancer.server.port=9001"
      ## API S3 (pour DokPloy)
      - "traefik.http.routers.minio-api-rtr.entrypoints=websecure"
      - "traefik.http.routers.minio-api-rtr.rule=Host(`s3.$DOMAIN_NAME`)"
      - "traefik.http.routers.minio-api-rtr.tls=true"
      - "traefik.http.routers.minio-api-rtr.middlewares=chain-no-auth@file"
      - "traefik.http.routers.minio-api-rtr.service=minio-api-svc"
      - "traefik.http.services.minio-api-svc.loadbalancer.server.port=9000"

  ############################# DATABASE

  # MariaDB - MySQL Database
  # After starting container for first time dexec and mysqladmin -u root password <password>
  mariadb:
    <<: *common-keys-core # See EXTENSION FIELDS at the top
    container_name: mariadb
    image: lscr.io/linuxserver/mariadb
    profiles: [ "db", "all" ]
    # ports:
      # - "$MARIADB_PORT:3306"
    volumes:
      - $DOCKERDIR/appdata/mariadb/data:/config
    environment:
      <<: *default-tz-puid-pgid
      FILE__MYSQL_ROOT_PASSWORD: /run/secrets/mysql_root_password # Note FILE__ (double underscore) - Issue #127
    secrets:
      - mysql_root_password

  # Redis - Key-value Store
  redis:
    <<: *common-keys-core # See EXTENSION FIELDS at the top
    container_name: redis
    image: redis:latest
    profiles: [ "db", "all" ]
    entrypoint: redis-server --appendonly yes --requirepass $REDIS_PASSWORD --maxmemory 512mb --maxmemory-policy allkeys-lru
    # ports:
      # - "$REDIS_PORT:6379"
    volumes:
      - $DOCKERDIR/appdata/redis/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro

  # phpMyAdmin - Database management
  # Create a new user with admin privileges. Cannot login as MySQL root for some reason.
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    profiles: [ "db", "all" ]
    networks:
      - proxy
    environment:
      - PMA_HOST=$MARIADB_HOST
      - PMA_PORT=$MARIADB_PORT
      #- PMA_ARBITRARY=1
      - MYSQL_ROOT_PASSWORD_FILE=/run/secrets/mysql_root_password
    secrets:
      - mysql_root_password
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.phpmyadmin-rtr.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmin-rtr.rule=Host(`pma.$DOMAIN_NAME`)"
      - "traefik.http.routers.phpmyadmin-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.phpmyadmin-rtr.middlewares=chain-oauth@file"
      ## HTTP Services
      - "traefik.http.routers.phpmyadmin-rtr.service=phpmyadmin-svc"
      - "traefik.http.services.phpmyadmin-svc.loadbalancer.server.port=80"

  # CloudBeaver - Web-based Database Administration
  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    restart: unless-stopped
    profiles: [ "db", "all" ]
    networks:
      - proxy
      - dokploy-network
    security_opt:
      - no-new-privileges:true
    volumes:
      - $DOCKERDIR/appdata/cloudbeaver:/opt/cloudbeaver/workspace
    environment:
      TZ: $TZ
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.cloudbeaver-rtr.entrypoints=websecure"
      - "traefik.http.routers.cloudbeaver-rtr.rule=Host(`cloudbeaver.$DOMAIN_NAME`)"
      - "traefik.http.routers.cloudbeaver-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.cloudbeaver-rtr.middlewares=chain-basic-auth@file"
      ## HTTP Services
      - "traefik.http.routers.cloudbeaver-rtr.service=cloudbeaver-svc"
      - "traefik.http.services.cloudbeaver-svc.loadbalancer.server.port=8978"

  # CloudBeaver Network Watcher - Auto-connects CloudBeaver to DokPloy app networks
  cloudbeaver-network-watcher:
    image: docker:cli
    container_name: cloudbeaver-network-watcher
    restart: unless-stopped
    profiles: [ "db", "all" ]
    depends_on:
      - cloudbeaver
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: $TZ
      TARGET_CONTAINER: cloudbeaver
      # Réseaux système à ignorer
      EXCLUDED_NETWORKS: "bridge host none proxy socket_proxy dokploy-network"
    entrypoint: >
      sh -c '
        echo "Connexion aux réseaux existants...";
        for net in $$(docker network ls --format "{{.Name}}"); do
          skip=0;
          for excl in $$EXCLUDED_NETWORKS; do [ "$$net" = "$$excl" ] && skip=1 && break; done;
          [ $$skip -eq 0 ] && docker network connect "$$net" "$$TARGET_CONTAINER" 2>/dev/null && echo "Connecté: $$net";
        done;
        echo "Surveillance des nouveaux réseaux...";
        docker events --filter "type=network" --filter "event=create" --format "{{.Actor.Attributes.name}}" | while read net; do
          skip=0;
          for excl in $$EXCLUDED_NETWORKS; do [ "$$net" = "$$excl" ] && skip=1 && break; done;
          [ $$skip -eq 0 ] && docker network connect "$$net" "$$TARGET_CONTAINER" 2>/dev/null && echo "Nouveau réseau connecté: $$net";
        done
      '

  ############################# MEDIA

  # Jellyfin - Media Server
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    profiles: [ "media", "all" ]
    networks:
      - proxy
    devices:
      - /dev/dri:/dev/dri # for harware transcoding
    security_opt:
      - no-new-privileges:true
    ports:
      - "8920:8920"
    environment:
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      UMASK_SET: 022
    volumes:
      - $DOCKERDIR/jellyfin:/config
      - /dev/shm:/ram_transcode
      - $USERDIR/media:/nas
    #   - /media:/nas:ro # Run in ro mode while upgrading JF
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.jellyfin-rtr.entrypoints=websecure"
      - "traefik.http.routers.jellyfin-rtr.rule=Host(`jellyfin.$DOMAIN_NAME`)"
      - "traefik.http.routers.jellyfin-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.jellyfin-rtr.middlewares=chain-no-auth@file"
      ## HTTP Services
      - "traefik.http.routers.jellyfin-rtr.service=jellyfin-svc"
      - "traefik.http.services.jellyfin-svc.loadbalancer.server.port=8096"

  ############################# UTILITIES

  # Grafana - Graphical data visualization for InfluxDB data
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    profiles: ["apps", "all"]
    networks:
      - proxy
    ports:
      - "3000:3000"
    user: $PUID
    volumes:
      - $DOCKERDIR/appdata/grafana:/var/lib/grafana
    environment:
      GF_INSTALL_PLUGINS: "grafana-clock-panel,grafana-simple-json-datasource,grafana-worldmap-panel,grafana-piechart-panel"
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.grafana-rtr.entrypoints=websecure"
      - "traefik.http.routers.grafana-rtr.rule=Host(`grafana.$DOMAIN_NAME`)"
      - "traefik.http.routers.grafana-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.grafana-rtr.middlewares=chain-oauth@file"
      ## HTTP Services
      - "traefik.http.routers.grafana-rtr.service=grafana-svc"
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=3000"

  ############################# DOWNLOADERS

  # TransmissionBT - Torrent Downloader
  # ONLY ACCESSIBLE THROUGH https://domain.com/transmission/web/ if using PathPrefix
  transmission-vpn:
    image: haugene/transmission-openvpn:latest
    container_name: transmission-vpn
    restart: always
    profiles: [ "media", "all" ]
    networks:
      - proxy
      # - t2_proxy
      # t2_proxy:
        # ipv4_address: 192.168.90.90
    # security_opt:
    #   - no-new-privileges:true
    ports:
      - "9091:9091"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun
    dns:
      - 1.1.1.1
      - 1.0.0.1
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - $DOCKERDIR/transmission-vpn/protonvpn:/etc/openvpn/custom/
      - $DOCKERDIR/transmission-vpn/data:/data
      - $DOCKERDIR/transmission-vpn/config:/config
      - $USERDIR/Downloads:/downloads
    environment:
      OPENVPN_PROVIDER: custom
      OPENVPN_USERNAME: $PROTONVPN_USERNAME
      OPENVPN_PASSWORD: $PROTONVPN_PASSWORD
      OPENVPN_CONFIG: $PROTONVPN_CONFIG
      OPENVPN_OPTS: --inactive 3600 --ping 10 --ping-exit 60
      LOCAL_NETWORK: "$LOCAL_NETWORK"
      PUID: $PUID
      PGID: $PGID
      TZ: $TZ
      UMASK_SET: 2
      TRANSMISSION_RPC_AUTHENTICATION_REQUIRED: "true"
      TRANSMISSION_RPC_HOST_WHITELIST: "127.0.0.1,$SERVER_IP"
      TRANSMISSION_RPC_PASSWORD: $TRANSMISSION_RPC_PASSWORD
      TRANSMISSION_RPC_USERNAME: $TRANSMISSION_RPC_USERNAME
      TRANSMISSION_UMASK: 002
      TRANSMISSION_RATIO_LIMIT: 0.01
      TRANSMISSION_RATIO_LIMIT_ENABLED: "true"
      TRANSMISSION_ALT_SPEED_DOWN: 2000
      TRANSMISSION_ALT_SPEED_ENABLED: "true"
      TRANSMISSION_ALT_SPEED_UP: 15
      TRANSMISSION_SPEED_LIMIT_DOWN: 6000
      TRANSMISSION_SPEED_LIMIT_DOWN_ENABLED: "true"
      TRANSMISSION_SPEED_LIMIT_UP: 30
      TRANSMISSION_SPEED_LIMIT_UP_ENABLED: "true"
      TRANSMISSION_INCOMPLETE_DIR: /downloads/incomplete
      TRANSMISSION_INCOMPLETE_DIR_ENABLED: "true"
      TRANSMISSION_WATCH_DIR: /downloads
      TRANSMISSION_WATCH_DIR_ENABLED: "true"
      TRANSMISSION_DOWNLOAD_DIR: /downloads/completed
    logging:
      driver: json-file
      options:
        max-size: 10m
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.transmission-vpn-rtr.entrypoints=websecure"
      - "traefik.http.routers.transmission-vpn-rtr.rule=Host(`trans.$DOMAIN_NAME`)"
      ## Middlewares
      - "traefik.http.routers.transmission-vpn-rtr.middlewares=middlewares-rate-limit@file"
      ## HTTP Services
      - "traefik.http.routers.transmission-vpn-rtr.service=transmission-vpn-svc"
      - "traefik.http.services.transmission-vpn-svc.loadbalancer.server.port=9091"

  ############################# MAINTENANCE

  # Docker-GC - Automatic Docker Garbage Collection
  # Create docker-gc-exclude file
  dockergc:
    image: clockworksoul/docker-gc-cron:latest
    container_name: docker-gc
    restart: unless-stopped
    profiles: [ "apps", "all" ]
    networks:
      - proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock # Use Docker Socket Proxy instead for improved security
      - $DOCKERDIR/appdata/docker-gc/docker-gc-exclude:/etc/docker-gc-exclude
    environment:
      CRON: 0 0 0 * * ? # Everyday at midnight. Previously 0 0 * * *
      FORCE_IMAGE_REMOVAL: 1
      FORCE_CONTAINER_REMOVAL: 0
      GRACE_PERIOD_SECONDS: 604800
      DRY_RUN: 0
      CLEAN_UP_VOLUMES: 1
      TZ: $TZ
      DOCKER_HOST: tcp://socket-proxy:2375

  # WhoAmI - For Testing and Troubleshooting
  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    profiles: [ "apps", "all" ]
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      ## HTTP Routers
      - "traefik.http.routers.whoami-rtr.entrypoints=websecure"
      - "traefik.http.routers.whoami-rtr.rule=Host(`whoami.$DOMAIN_NAME`)"
      - "traefik.http.routers.whoami-rtr.tls=true"
      ## Middlewares
      - "traefik.http.routers.whoami-rtr.middlewares=chain-basic-auth@file"
      ## HTTP Services
      - "traefik.http.routers.whoami-rtr.service=whoami-svc"
      - "traefik.http.services.whoami-svc.loadbalancer.server.port=80"

  ########################### WEB

  # Nginx - Web Server
  nginx:
    <<: *common-keys-core # See EXTENSION FIELDS at the top
    container_name: nginx
    image: nginx:1.20
    profiles: [ "web", "all" ]
    depends_on:
      - php7
      - redis
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - $DOCKERDIR/logs/web/nginx:/var/log/nginx
      - $DOCKERDIR/appdata/nginx:/etc/nginx
      # - $DOCKERDIR/appdata/sites/dash/html:/var/www/html/dash
    secrets:
      - htpasswd
    labels:
      - "traefik.enable=true"
      ## HTTP Routers SHB (WordPress) Auth
      # - "traefik.http.routers.nginx-shb-auth-rtr.entrypoints=websecure"
      # - "traefik.http.routers.nginx-shb-auth-rtr.rule=Host(`www.$DOMAIN_NAME`) && Path(`/wp-login.php`)"
      # - "traefik.http.routers.nginx-shb-auth-rtr.priority=100"
      ## HTTP Routers SHB (WordPress) Bypass
      # - "traefik.http.routers.nginx-shb-rtr.entrypoints=websecure"
      # - "traefik.http.routers.nginx-shb-rtr.rule=Host(`$DOMAIN_NAME`) || Host(`www.$DOMAIN_NAME`)"
      # - "traefik.http.routers.nginx-shb-rtr.priority=99"
      ## HTTP Routers SHB Beta (WordPress)
      #- "traefik.http.routers.nginx-shb-beta-rtr.entrypoints=websecure"
      #- "traefik.http.routers.nginx-shb-beta-rtr.rule=Host(`beta.$DOMAIN_NAME`)"
      ## HTTP Routers DASH (non-WordPress)
      # - "traefik.http.routers.nginx-dash-rtr.entrypoints=websecure"
      # - "traefik.http.routers.nginx-dash-rtr.rule=Host(`dash.$DOMAIN_NAME`)"
      ## HTTP Routers KHUB (non-WordPress)
      # - "traefik.http.routers.nginx-khub-rtr.entrypoints=websecure"
      # - "traefik.http.routers.nginx-khub-rtr.rule=Host(`$DOMAIN_NAME_KHUB`) || Host(`www.$DOMAIN_NAME_KHUB`)"
      # Redirect shb non-www to www middleware
      # - "traefik.http.middlewares.shb-redirect.redirectregex.regex=^https?://$DOMAIN_NAME/(.*)"
      # - "traefik.http.middlewares.shb-redirect.redirectregex.replacement=https://www.$DOMAIN_NAME/$${1}"
      # - "traefik.http.middlewares.shb-redirect.redirectregex.permanent=true"
      ## Middlewares
      # - "traefik.http.routers.nginx-shb-rtr.middlewares=shb-redirect,chain-no-auth-wp@file"
      # - "traefik.http.routers.nginx-shb-auth-rtr.middlewares=shb-redirect,chain-oauth-wp@file"
      ## HTTP Services
      # - "traefik.http.routers.nginx-shb-rtr.service=nginx-svc"
      - "traefik.http.services.nginx-svc.loadbalancer.server.port=80"

  # PHP - Hypertext Preprocessor
  php7:
    <<: *common-keys-core # See EXTENSION FIELDS at the top
    container_name: php7
    image: php:7.4-fpm-custom
    profiles: [ "web", "all" ]
    build:
      context: $DOCKERDIR/custom/
      dockerfile: Dockerfile-php7
    user: $PUID:$PGID # allows upgrading WP and plugins
    volumes:
      - $DOCKERDIR/appdata/php/php7:/usr/local/etc/php
      # - $DOCKERDIR/appdata/sites/khub/html:/var/www/html/khub

